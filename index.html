

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div id="app"></div>

  <script>
   window.$docsify = {
  name: 'My Docs',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 3,
  auto2top: true,
  coverpage: false,
  themeColor: '#3f51b5'
}
 </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
   body {
    font-family: "JetBrains Mono", monospace;
    background: #fafafa;
  }

  .sidebar {
    width: 260px;
    border-right: 1px solid #e5e5e5;
    background: #fff;
    font-family: "JetBrains Mono", monospace;
  }

  .content {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 50px;
    background: #fff;
    border-left: 1px solid #e5e5e5;
    border-right: 1px solid #e5e5e5;
    min-height: 100vh;
    font-family: "JetBrains Mono", monospace;
  }

  .markdown-section {
    font-family: "JetBrains Mono", monospace;
  }

  pre code {
    font-family: "JetBrains Mono", monospace;
  }
  .sidebar-nav > ul > li > a {
    font-weight: 600;
    color: #333;
    padding: 10px 18px;
  }

  .sidebar-nav ul ul a {
    padding: 6px 26px;
    color: #555;
  }

  .sidebar-nav a:hover {
    background: #f3f3f3;
  }

  /* Headings */
  .markdown-section h1 {
    font-size: 2.1rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .markdown-section h2 {
    font-size: 1.6rem;
    margin-top: 2rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
  }

  /* Paragraphs */
  .markdown-section p {
    line-height: 1.7;
    color: #444;
  }

  /* Lists */
  .markdown-section ul {
    margin-left: 20px;
  }

  /* “Last updated” footer style */
  .markdown-section::after {
    content: "Last updated automatically";
    display: block;
    margin-top: 60px;
    font-size: 0.85rem;
    color: #999;
  }
</style>

</body>
</html>
